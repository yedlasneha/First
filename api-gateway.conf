worker_processes 1;
events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    server_tokens off;

    upstream auth_service    { server auth-service:8081; }
    upstream product_service { server product-service:8082; }
    upstream cart_service    { server cart-service:8083; }
    upstream order_service   { server order-service:8084; }

    server {
        listen 80;
        server_name _;

        # CORS headers for all API responses
        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin" always;

        # Handle preflight OPTIONS globally
        location / {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin  * always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin" always;
                add_header Access-Control-Max-Age 3600;
                add_header Content-Length 0;
                return 204;
            }
            return 403 "Access denied\n";
        }

        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        location /api/auth/ {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin  * always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin" always;
                add_header Content-Length 0;
                return 204;
            }
            proxy_pass         http://auth_service$request_uri;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        location /api/cart/ {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin  * always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin" always;
                add_header Content-Length 0;
                return 204;
            }
            proxy_pass         http://cart_service$request_uri;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        location /api/orders/ {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin  * always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin" always;
                add_header Content-Length 0;
                return 204;
            }
            proxy_pass         http://order_service$request_uri;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        location /api/admin/ {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin  * always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin" always;
                add_header Content-Length 0;
                return 204;
            }
            proxy_pass         http://order_service$request_uri;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        location /api/ {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin  * always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin" always;
                add_header Content-Length 0;
                return 204;
            }
            proxy_pass         http://product_service$request_uri;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }
}
