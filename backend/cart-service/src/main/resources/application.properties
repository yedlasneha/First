spring.application.name=cart-service
server.port=8083

# ── MySQL Database ────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ksrfruits?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Connection Pool ───────────────────────────────────────────────────────
spring.datasource.hikari.pool-name=CartPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# ── JPA / Hibernate ───────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Logging ───────────────────────────────────────────────────────────────
logging.level.com.sneha.KSR_Fruits=INFO
logging.level.org.springframework.web=WARN
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{30} - %msg%n
