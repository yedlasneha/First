spring.application.name=product-service
server.port=8082

# ── MySQL Database ────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ksrfruits?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Connection Pool (HikariCP) ────────────────────────────────────────────
spring.datasource.hikari.pool-name=ProductPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# ── SQL Init ─────────────────────────────────────────────────────────────
spring.sql.init.mode=never

# ── JPA / Hibernate ───────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ── Request size limits (supports large base64 banner images) ─────────────
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
server.tomcat.max-http-form-post-size=-1
server.tomcat.max-swallow-size=-1
# Jackson max string length for large base64 payloads
spring.jackson.deserialization.fail-on-unknown-properties=false

# ── Logging ───────────────────────────────────────────────────────────────
logging.level.com.sneha.KSR_Fruits=INFO
logging.level.org.springframework.web=WARN
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{30} - %msg%n
