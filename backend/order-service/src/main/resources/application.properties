spring.application.name=order-service
server.port=8084

# ── MySQL Database ────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/ksrfruits?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Connection Pool (HikariCP) ────────────────────────────────────────────
spring.datasource.hikari.pool-name=OrderPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA / Hibernate ───────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ── Kafka disabled ────────────────────────────────────────────────────────
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# ── Auth service URL ──────────────────────────────────────────────────────
auth.service.url=http://localhost:8081

# ── Logging ───────────────────────────────────────────────────────────────
logging.level.com.sneha.KSR_Fruits=INFO
logging.level.org.springframework.web=WARN
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{30} - %msg%n
