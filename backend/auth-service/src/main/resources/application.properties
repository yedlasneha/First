spring.application.name=auth-service
server.port=8081

# ── MySQL Database ────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ksrfruits?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Connection Pool ───────────────────────────────────────────────────────
spring.datasource.hikari.pool-name=AuthPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA / Hibernate ───────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false

# ── JWT ───────────────────────────────────────────────────────────────────
jwt.secret=KsrFruitsSecretKeyForJWTTokenGenerationAndValidation2024ThisIsAVeryLongSecretKeyForHS512Algorithm
# 30 days in ms — user stays logged in until they click logout
jwt.expiration=2592000000

# ── Gmail SMTP (for OTP emails) ───────────────────────────────────────────
# Sends from: ksrfruitshelp@gmail.com
# IMPORTANT: Use a Gmail App Password, NOT your regular Gmail password.
# Steps to get App Password:
#   1. Go to https://myaccount.google.com/security
#   2. Enable 2-Step Verification (if not already)
#   3. Search "App Passwords" → Select app: Mail → Generate
#   4. Copy the 16-character password and paste it below (no spaces)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=ksrfruitshelp@gmail.com
spring.mail.password=${MAIL_PASSWORD:tfrrkjlufrcmufm}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# ── OTP Mode ─────────────────────────────────────────────────────────────
# true  = DEV MODE:  No email sent. OTP shown on screen. Any email works.
# false = PROD MODE: Real email sent via Gmail SMTP. Must set App Password above.
otp.mock.enabled=${OTP_MOCK:false}

# ── Logging ───────────────────────────────────────────────────────────────
logging.level.com.sneha.KSR_Fruits=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.springframework.mail=DEBUG
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{30} - %msg%n